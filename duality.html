<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Dual Sync</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07161a;color:#eafcff;font-family:monospace}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.hud{position:fixed;inset:22px;display:flex;justify-content:space-between;pointer-events:none;letter-spacing:.1em;font-weight:bold}.hud b{font-size:28px}.screen{position:fixed;inset:0;display:grid;place-items:center;background:#07161ae8;text-align:center}.screen.hide{display:none}.screen h1{font:900 clamp(60px,12vw,140px)/.7 Arial;margin:0;letter-spacing:-.09em}.screen h1 span{display:block;color:transparent;-webkit-text-stroke:2px #54e5ff}.screen p{margin:30px 15px;line-height:1.6}.screen button{border:0;background:#54e5ff;color:#07161a;padding:16px 28px;font-weight:bold;box-shadow:7px 7px #ffcf35;cursor:pointer}.hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);font-size:10px;letter-spacing:.12em;opacity:.65;pointer-events:none;white-space:nowrap}
</style></head><body><canvas></canvas><div class="hud"><span>DUAL//SYNC</span><b id="score">0000</b></div><div class="hint">Q / D — FLÈCHES — TOUCHER POUR CHANGER DE VOIE</div><div class="screen" id="screen"><div><h1>DUAL<span>SYNC</span></h1><p>Deux signaux. Trois voies. Une seule décision commune.</p><button id="go">SYNCHRONISER →</button></div></div><script>
const c=document.querySelector('canvas'),x=c.getContext('2d'),screen=document.querySelector('#screen'),scoreEl=document.querySelector('#score');let W,H,run=false,paused=false,lane=1,targetLane=1,players=[],walls=[],parts=[],score=0,speed=5,wave=0,last=0,shake=0;
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;layout()}addEventListener('resize',resize);
function laneX(side,l){let half=W/2,pad=Math.max(35,half*.12),span=(half-pad*2)/3;return side===0?pad+span*(l+.5):half+pad+span*(2-l+.5)}
function layout(){players=[{x:laneX(0,lane),y:H-90,c:'#54e5ff'},{x:laneX(1,lane),y:H-90,c:'#ffcf35'}]}
function reset(){lane=targetLane=1;walls=[];parts=[];score=0;speed=5;wave=0;run=true;screen.classList.add('hide');scoreEl.textContent='0000';layout();spawnWave()}
function spawnWave(){let safe=Math.floor(Math.random()*3),y=-90-wave%2*45;for(let side=0;side<2;side++)for(let l=0;l<3;l++)if(l!==safe)walls.push({side,l,x:laneX(side,l),y,w:Math.max(28,W/18),h:44});wave++}
function move(d){if(!run||paused)return;targetLane=Math.max(0,Math.min(2,targetLane+d));burst(players[0].x,players[0].y,'#54e5ff',6);burst(players[1].x,players[1].y,'#ffcf35',6)}
function burst(px,py,col,n){for(let i=0;i<n;i++)parts.push({x:px,y:py,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,l:1,c:col})}
function die(){run=false;shake=18;players.forEach(p=>burst(p.x,p.y,p.c,24));let best=Math.max(Math.floor(score),+(localStorage.dualBest||0));localStorage.dualBest=best;screen.querySelector('p').textContent='SYNC '+Math.floor(score)+' — RECORD '+best;screen.querySelector('button').textContent='RECONNECTER →';setTimeout(()=>screen.classList.remove('hide'),350)}
function update(dt){speed=Math.min(13,5+score/420);score+=dt*speed*5;scoreEl.textContent=Math.floor(score).toString().padStart(4,'0');lane+=(targetLane-lane)*Math.min(1,dt*15);players.forEach((p,i)=>p.x=laneX(i,lane));let need=false;walls.forEach((b,i)=>{b.y+=speed*dt*60;b.x=laneX(b.side,b.l);let p=players[b.side];if(Math.abs(p.x-b.x)<b.w*.55+11&&p.y+11>b.y&&p.y-11<b.y+b.h)die();if(b.y>H+60){walls.splice(i,1);need=true}});if(need&&walls.filter(b=>b.y<0).length===0)spawnWave();parts.forEach((p,i)=>{p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.l-=dt*2;if(p.l<=0)parts.splice(i,1)});shake*=.84}
function draw(){x.save();x.clearRect(0,0,W,H);x.fillStyle='#07161a';x.fillRect(0,0,W,H);x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);x.strokeStyle='#54e5ff33';x.beginPath();x.moveTo(W/2,0);x.lineTo(W/2,H);x.stroke();for(let side=0;side<2;side++)for(let l=0;l<3;l++){x.strokeStyle=side?'#ffcf3518':'#54e5ff18';x.beginPath();x.moveTo(laneX(side,l),0);x.lineTo(laneX(side,l),H);x.stroke()}walls.forEach(b=>{x.fillStyle=b.side?'#ffcf35':'#54e5ff';x.fillRect(b.x-b.w/2,b.y,b.w,b.h);x.fillStyle='#07161a';x.fillRect(b.x-2,b.y+8,4,b.h-16)});players.forEach((p,i)=>{x.save();x.translate(p.x,p.y);x.rotate((i?1:-1)*score*.025);x.fillStyle=p.c;x.shadowBlur=24;x.shadowColor=p.c;x.fillRect(-11,-11,22,22);x.fillStyle='#fff';x.fillRect(-3,-3,6,6);x.restore()});parts.forEach(p=>{x.globalAlpha=Math.max(0,p.l);x.fillStyle=p.c;x.fillRect(p.x,p.y,3,3)});x.globalAlpha=1;x.restore()}
function loop(now){let dt=Math.min((now-last)/1000,.033)||0;last=now;if(run&&!paused)update(dt);draw();requestAnimationFrame(loop)}
addEventListener('keydown',e=>{if(e.key==='Escape'){parent.postMessage('togglePause','*');return}if(['ArrowLeft','q','a'].includes(e.key.toLowerCase())){e.preventDefault();move(-1)}if(['ArrowRight','d'].includes(e.key.toLowerCase())){e.preventDefault();move(1)}});c.addEventListener('pointerdown',e=>move(e.clientX<W/2?-1:1));addEventListener('message',e=>{if(e.data==='pause')paused=true;if(e.data==='resume')paused=false});document.querySelector('#go').onclick=reset;resize();requestAnimationFrame(loop);
</script></body></html>
