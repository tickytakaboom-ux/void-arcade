<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Dual Sync</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07161a;color:#eafcff;font-family:monospace}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.hud{position:fixed;inset:22px;display:flex;justify-content:space-between;pointer-events:none;letter-spacing:.1em;font-weight:bold;text-shadow:0 0 18px #54e5ff66}.hud b{font-size:28px}.screen{position:fixed;inset:0;display:grid;place-items:center;background:#07161af0;text-align:center}.screen.hide{display:none}.screen h1{font:900 clamp(60px,12vw,140px)/.7 Arial;margin:0;letter-spacing:-.09em}.screen h1 span{display:block;color:transparent;-webkit-text-stroke:2px #54e5ff}.screen p{margin:30px 15px;line-height:1.6}.screen button{border:0;background:#54e5ff;color:#07161a;padding:16px 28px;font-weight:bold;box-shadow:7px 7px #ffcf35;cursor:pointer}.hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);font-size:10px;letter-spacing:.12em;opacity:.68;pointer-events:none;white-space:nowrap}.keys{position:fixed;top:62px;left:22px;right:22px;display:flex;justify-content:space-between;font-size:11px;letter-spacing:.12em;opacity:.7;pointer-events:none}.keys span:last-child{text-align:right;color:#ffcf35}.keys span:first-child{color:#54e5ff}
</style></head><body><canvas></canvas><div class="hud"><span>DUAL//SYNC</span><b id="score">0000</b></div><div class="keys"><span>BLEU : Q / D</span><span>JAUNE : ← / →</span></div><div class="hint">DEUX MAINS — DEUX PARCOURS — UN SEUL RYTHME</div><div class="screen" id="screen"><div><h1>DUAL<span>SYNC</span></h1><p>Contrôle le bleu avec Q/D, le jaune avec les flèches. Les deux routes ne racontent plus la même histoire.</p><button id="go">SYNCHRONISER →</button></div></div><script>
const c=document.querySelector('canvas'),x=c.getContext('2d'),screen=document.querySelector('#screen'),scoreEl=document.querySelector('#score');
let W,H,run=false,paused=false,players=[],walls=[],parts=[],score=0,speed=5,wave=0,last=0,shake=0,combo=0;
let blueLane=1,blueTarget=1,yellowLane=1,yellowTarget=1,nextSpawn=0;
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;layout()}addEventListener('resize',resize);
function laneX(side,l){let half=W/2,pad=Math.max(34,Math.min(82,half*.13)),span=(half-pad*2)/3;return side===0?pad+span*(l+.5):half+pad+span*(l+.5)}
function layout(){players=[{side:0,x:laneX(0,blueLane),y:H-92,c:'#54e5ff',name:'BLEU'},{side:1,x:laneX(1,yellowLane),y:H-92,c:'#ffcf35',name:'JAUNE'}]}
function reset(){blueLane=blueTarget=1;yellowLane=yellowTarget=1;walls=[];parts=[];score=0;speed=5;wave=0;combo=0;nextSpawn=0;shake=0;run=true;screen.classList.add('hide');scoreEl.textContent='0000';layout();spawnWave(true)}
function chooseSafe(prev,other){let lanes=[0,1,2].filter(v=>v!==prev);if(wave>3&&Math.random()<.38)lanes=lanes.filter(v=>v!==other)||lanes;return lanes[Math.floor(Math.random()*lanes.length)]}
function spawnWave(first=false){let prevB=walls.lastB??1,prevY=walls.lastY??1,safeB=first?1:chooseSafe(prevB,prevY),safeY=first?1:chooseSafe(prevY,safeB);walls.lastB=safeB;walls.lastY=safeY;let base=-90,offset=wave%2?52:0;for(let l=0;l<3;l++){if(l!==safeB)walls.push({side:0,l,y:base-offset,w:Math.max(26,Math.min(58,W/22)),h:42,passed:false});if(l!==safeY)walls.push({side:1,l,y:base-52+offset,w:Math.max(26,Math.min(58,W/22)),h:42,passed:false})}burst(laneX(0,safeB),22,'#54e5ff',5);burst(laneX(1,safeY),22,'#ffcf35',5);wave++;nextSpawn=Math.max(145,240-speed*8)}
function move(side,d){if(!run||paused)return;let target=side?yellowTarget:blueTarget,target2=Math.max(0,Math.min(2,target+d));if(side)yellowTarget=target2;else blueTarget=target2;let p=players[side];burst(p.x,p.y,p.c,7)}
function burst(px,py,col,n){for(let i=0;i<n;i++)parts.push({x:px,y:py,vx:(Math.random()-.5)*4.8,vy:(Math.random()-.5)*4.8,l:1,c:col})}
function die(side){if(!run)return;run=false;shake=24;players.forEach(p=>burst(p.x,p.y,p.c,28));let best=Math.max(Math.floor(score),+(localStorage.dualBest||0));localStorage.dualBest=best;screen.querySelector('p').textContent=(side?'JAUNE':'BLEU')+' A DÉCROCHÉ — SYNC '+Math.floor(score)+' — RECORD '+best;screen.querySelector('button').textContent='RECONNECTER →';setTimeout(()=>screen.classList.remove('hide'),360)}
function update(dt){speed=Math.min(14.5,5+score/390);score+=dt*speed*(5+Math.min(combo,18)*.08);scoreEl.textContent=Math.floor(score).toString().padStart(4,'0');nextSpawn-=speed*dt*60;if(nextSpawn<=0)spawnWave();blueLane+=(blueTarget-blueLane)*Math.min(1,dt*16);yellowLane+=(yellowTarget-yellowLane)*Math.min(1,dt*16);players[0].x=laneX(0,blueLane);players[1].x=laneX(1,yellowLane);walls.forEach((b,i)=>{b.y+=speed*dt*60;b.x=laneX(b.side,b.l);let p=players[b.side];if(Math.abs(p.x-b.x)<b.w*.56+11&&p.y+11>b.y&&p.y-11<b.y+b.h)die(b.side);if(!b.passed&&b.y>p.y+18){b.passed=true;combo++;burst(p.x,p.y,p.c,2)}if(b.y>H+80)walls.splice(i,1)});parts.forEach((p,i)=>{p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.l-=dt*2.2;if(p.l<=0)parts.splice(i,1)});shake*=.83}
function draw(){x.save();x.clearRect(0,0,W,H);x.fillStyle='#07161a';x.fillRect(0,0,W,H);x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);let g=x.createLinearGradient(0,0,W,0);g.addColorStop(0,'#54e5ff0b');g.addColorStop(.5,'#ffffff05');g.addColorStop(1,'#ffcf350b');x.fillStyle=g;x.fillRect(0,0,W,H);x.strokeStyle='#eafcff22';x.beginPath();x.moveTo(W/2,0);x.lineTo(W/2,H);x.stroke();for(let side=0;side<2;side++)for(let l=0;l<3;l++){x.strokeStyle=side?'#ffcf351a':'#54e5ff1a';x.beginPath();x.moveTo(laneX(side,l),0);x.lineTo(laneX(side,l),H);x.stroke()}walls.forEach(b=>{x.save();x.translate(b.x,b.y);x.fillStyle=b.side?'#ffcf35':'#54e5ff';x.shadowBlur=18;x.shadowColor=x.fillStyle;x.fillRect(-b.w/2,0,b.w,b.h);x.fillStyle='#07161a';x.fillRect(-2,8,4,b.h-16);x.restore()});players.forEach((p,i)=>{x.save();x.translate(p.x,p.y);x.rotate((i?1:-1)*score*.028);x.fillStyle=p.c;x.shadowBlur=26;x.shadowColor=p.c;x.fillRect(-12,-12,24,24);x.fillStyle='#fff';x.fillRect(-3,-3,6,6);x.restore()});parts.forEach(p=>{x.globalAlpha=Math.max(0,p.l);x.fillStyle=p.c;x.fillRect(p.x,p.y,3,3)});x.globalAlpha=1;x.restore()}
function loop(now){let dt=Math.min((now-last)/1000,.033)||0;last=now;if(run&&!paused)update(dt);draw();requestAnimationFrame(loop)}
addEventListener('keydown',e=>{let k=e.key.toLowerCase();if(e.key==='Escape'){parent.postMessage('togglePause','*');return}if(k==='q'||k==='a'){e.preventDefault();move(0,-1)}if(k==='d'){e.preventDefault();move(0,1)}if(e.key==='ArrowLeft'){e.preventDefault();move(1,-1)}if(e.key==='ArrowRight'){e.preventDefault();move(1,1)}});c.addEventListener('pointerdown',e=>{let side=e.clientX<W/2?0:1,zone=(e.clientX%(W/2))/(W/2);move(side,zone<.5?-1:1)});addEventListener('message',e=>{if(e.data==='pause')paused=true;if(e.data==='resume')paused=false});document.querySelector('#go').onclick=reset;resize();requestAnimationFrame(loop);
</script></body></html>
