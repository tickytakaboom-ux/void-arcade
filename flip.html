<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Flip Void</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#d9ff3e;color:#0a0b0d;font-family:monospace}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.hud{position:fixed;inset:22px;display:flex;justify-content:space-between;pointer-events:none;font-weight:bold;letter-spacing:.08em}.hud b{font-size:26px}.screen{position:fixed;inset:0;display:grid;place-items:center;background:#d9ff3ee8;text-align:center}.screen.hide{display:none}.screen h1{font:900 clamp(62px,13vw,150px)/.7 Arial;margin:0;letter-spacing:-.09em}.screen h1 span{display:block;color:transparent;-webkit-text-stroke:3px #0a0b0d}.screen p{margin:32px 15px 24px}.screen button{border:0;background:#0a0b0d;color:white;padding:16px 28px;font-weight:bold;box-shadow:7px 7px #ff315f;cursor:pointer}.hint{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);font-size:10px;letter-spacing:.1em;pointer-events:none;opacity:.6}
</style></head><body><canvas></canvas><div class="hud"><span>FLIP//VOID</span><b id="score">0000</b></div><div class="hint">ESPACE / CLIC — INVERSER LA GRAVITÉ</div><div class="screen" id="screen"><div><h1>FLIP<span>VOID</span></h1><p>Le sol est facultatif. Les murs, beaucoup moins.</p><button id="go">BASCULER DANS LE VIDE →</button></div></div><script>
const c=document.querySelector('canvas'),x=c.getContext('2d'),screen=document.querySelector('#screen'),scoreEl=document.querySelector('#score');let W,H,player,blocks,parts,score,speed,run=false,paused=false,last=0,spawn=0,shake=0;
function resize(){W=c.width=innerWidth;H=c.height=innerHeight}addEventListener('resize',resize);resize();
function reset(){player={x:W*.22,y:H-54,vy:0,g:1,r:12,rot:0};blocks=[];parts=[];score=0;speed=6;spawn=40;run=true;screen.classList.add('hide');scoreEl.textContent='0000'}
function flip(){if(!run||paused)return;player.g*=-1;player.vy=player.g*-.5;burst(player.x,player.y);shake=4}
function burst(px,py){for(let i=0;i<12;i++)parts.push({x:px,y:py,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,l:1})}
function addBlock(){let top=Math.random()>.5,h=55+Math.random()*Math.min(145,H*.25),w=28+Math.random()*35;blocks.push({x:W+30,y:top?0:H-h,w,h,top});if(score>300&&Math.random()>.55){let gap=130+Math.random()*80;blocks.push({x:W+30+gap,y:top?H-(50+Math.random()*90):0,w:24+Math.random()*25,h:50+Math.random()*90,top:!top})}}
function die(){run=false;shake=18;burst(player.x,player.y);let best=Math.max(score,+(localStorage.flipBest||0));localStorage.flipBest=best;screen.querySelector('p').textContent='DISTANCE '+Math.floor(score)+' — RECORD '+Math.floor(best);screen.querySelector('button').textContent='RECOMMENCER →';setTimeout(()=>screen.classList.remove('hide'),350)}
function update(dt){speed=Math.min(14,6+score/350);score+=dt*speed*8;scoreEl.textContent=Math.floor(score).toString().padStart(4,'0');player.vy+=player.g*.9*dt*60;player.y+=player.vy*dt*60;player.rot+=player.g*.075*dt*60;let floor=H-34,ceil=34;if(player.y>floor){player.y=floor;player.vy=0}if(player.y<ceil){player.y=ceil;player.vy=0}spawn-=speed*dt*60;if(spawn<0){addBlock();spawn=200+Math.random()*130}
 blocks.forEach((b,i)=>{b.x-=speed*dt*60;if(b.x+b.w<0)blocks.splice(i,1);if(player.x+player.r>b.x&&player.x-player.r<b.x+b.w&&player.y+player.r>b.y&&player.y-player.r<b.y+b.h)die()});parts.forEach((p,i)=>{p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.l-=dt*2;if(p.l<0)parts.splice(i,1)});shake*=.85}
function draw(){x.save();x.clearRect(0,0,W,H);x.fillStyle='#d9ff3e';x.fillRect(0,0,W,H);x.translate(shake?(Math.random()-.5)*shake:0,shake?(Math.random()-.5)*shake:0);x.strokeStyle='#0a0b0d18';x.lineWidth=1;let off=(score*2)%48;for(let i=-48;i<W+48;i+=48){x.beginPath();x.moveTo(i-off,0);x.lineTo(i-off,H);x.stroke()}x.fillStyle='#0a0b0d';x.fillRect(0,0,W,22);x.fillRect(0,H-22,W,22);blocks.forEach(b=>{x.fillStyle='#ff315f';x.fillRect(b.x,b.y,b.w,b.h);x.fillStyle='#0a0b0d';for(let j=5;j<b.w;j+=13)x.fillRect(b.x+j,b.top?b.h-9:b.y,5,9)});x.save();x.translate(player.x,player.y);x.rotate(player.rot);x.fillStyle='#0a0b0d';x.fillRect(-12,-12,24,24);x.fillStyle='#fff';x.fillRect(2,-7,5,5);x.restore();parts.forEach(p=>{x.globalAlpha=Math.max(0,p.l);x.fillStyle='#ff315f';x.fillRect(p.x,p.y,4,4)});x.globalAlpha=1;x.restore()}
function loop(now){let dt=Math.min((now-last)/1000,.033)||0;last=now;if(run&&!paused)update(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);
document.querySelector('#go').onclick=reset;addEventListener('keydown',e=>{if(e.key==='Escape'){parent.postMessage('togglePause','*');return}if(e.code==='Space'||e.key==='ArrowUp'){e.preventDefault();flip()}});c.addEventListener('pointerdown',flip);addEventListener('message',e=>{if(e.data==='pause')paused=true;if(e.data==='resume')paused=false});
</script></body></html>
