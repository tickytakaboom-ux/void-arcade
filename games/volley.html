<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Violet Volley</title><style>*{box-sizing:border-box}body{margin:0;overflow:hidden;background:#7654ef;color:#fff;font-family:monospace}canvas{width:100vw;height:100vh}.hud{position:fixed;inset:22px;display:flex;justify-content:space-between;pointer-events:none}.hud #score{position:fixed;left:50%;top:18px;transform:translateX(-50%);font:900 clamp(28px,5vw,58px) Arial;letter-spacing:.12em;text-shadow:0 3px 0 #15110f}.start{position:fixed;inset:0;display:grid;place-items:center;background:#7654efd9;text-align:center}.start h1{font:900 clamp(52px,10vw,110px)/.78 Arial;margin:0;letter-spacing:-.07em}.start button{margin-top:28px;background:#d9ff3e;border:0;padding:16px 26px;font-weight:bold;box-shadow:6px 6px #ff315f;cursor:pointer}.hide{display:none}</style></head><body><canvas></canvas><div class="hud"><b>VIOLET VOLLEY</b><b id="score">0 : 0</b></div><div class="start" id="start"><div><h1>VIOLET<br>VOLLEY</h1><p>SOURIS / TOUCHER — premier à 7</p><button>COMMENCER →</button></div></div><script>const c=document.querySelector('canvas'),x=c.getContext('2d'),start=document.querySelector('#start'),scoreEl=document.querySelector('#score');let W,H,p,b,score=[0,0],run=false,paused=false,paused=false;function resize(){W=c.width=innerWidth;H=c.height=innerHeight;reset()}onresize=resize;function reset(){p=[H/2,H/2];b={x:W/2,y:H/2,vx:(Math.random()>.5?1:-1)*6,vy:(Math.random()-.5)*7}}function begin(){score=[0,0];scoreEl.textContent='0 : 0';reset();run=true;start.classList.add('hide')}function update(){if(run&&!paused){p[1]+=(b.y-p[1])*.075;b.x+=b.vx;b.y+=b.vy;if(b.y<12||b.y>H-12)b.vy*=-1;if(b.x<42&&Math.abs(b.y-p[0])<70){b.vx=Math.abs(b.vx)*1.04;b.vy+=(b.y-p[0])*.035}if(b.x>W-42&&Math.abs(b.y-p[1])<70){b.vx=-Math.abs(b.vx)*1.04;b.vy+=(b.y-p[1])*.035}if(b.x<0||b.x>W){score[b.x<0?1:0]++;scoreEl.textContent=score.join(' : ');if(score.some(v=>v>=7)){run=false;start.querySelector('p').textContent=(score[0]>score[1]?'VICTOIRE':'LE VIDE GAGNE')+' — '+score.join(' : ');start.classList.remove('hide')}reset()}}draw();requestAnimationFrame(update)}function draw(){x.fillStyle='#7654ef';x.fillRect(0,0,W,H);x.strokeStyle='#ffffff44';x.setLineDash([10,12]);x.beginPath();x.moveTo(W/2,0);x.lineTo(W/2,H);x.stroke();x.setLineDash([]);x.fillStyle='#fff';x.fillRect(24,p[0]-60,12,120);x.fillRect(W-36,p[1]-60,12,120);x.beginPath();x.arc(b.x,b.y,10,0,7);x.fill()}function move(e){let q=e.touches?e.touches[0]:e;p[0]=q.clientY}addEventListener('mousemove',move);addEventListener('touchmove',move,{passive:true});start.querySelector('button').onclick=begin;addEventListener('keydown',e=>{if(e.key==='Escape')parent.postMessage('togglePause','*')});addEventListener('message',e=>{if(e.data==='pause')paused=true;if(e.data==='resume')paused=false});resize();update()</script></body></html>
