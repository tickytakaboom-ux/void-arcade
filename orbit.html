<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Orbit Lock</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#090a0e;color:#f0ede4;font-family:monospace}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.hud{position:fixed;inset:22px;display:flex;justify-content:space-between;pointer-events:none;letter-spacing:.12em;font-weight:bold}.hud b{font-size:30px;color:#d9ff3e;text-shadow:0 0 22px #d9ff3e77}.hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);font-size:10px;letter-spacing:.13em;opacity:.7;pointer-events:none;white-space:nowrap}.screen{position:fixed;inset:0;display:grid;place-items:center;background:#090a0ef0;text-align:center}.screen.hide{display:none}.screen h1{font:900 clamp(60px,12vw,140px)/.72 Arial;margin:0;letter-spacing:-.08em}.screen h1 span{display:block;color:transparent;-webkit-text-stroke:2px #d9ff3e}.screen p{margin:28px auto;max-width:520px;line-height:1.7;padding:0 18px}.screen button{border:0;background:#d9ff3e;color:#090a0e;padding:16px 28px;font-weight:900;box-shadow:7px 7px #ff315f;cursor:pointer}.toast{position:fixed;top:74px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.2em;color:#ff315f;opacity:0;transition:.15s;pointer-events:none}.toast.on{opacity:1}
</style></head><body><canvas></canvas><div class="hud"><span>ORBIT//LOCK</span><b id="score">0000</b></div><div class="toast" id="toast">BREACH</div><div class="hint">ESPACE / CLIC — VERROUILLE LA FAILLE</div><div class="screen" id="screen"><div><h1>ORBIT<span>LOCK</span></h1><p>Un coffre orbital. Une faille lumineuse. Appuie quand le curseur traverse la zone verte pour casser le verrou.</p><button id="go">FORCER LE COFFRE →</button></div></div><script>
const c=document.querySelector('canvas'),x=c.getContext('2d'),screen=document.querySelector('#screen'),scoreEl=document.querySelector('#score'),toast=document.querySelector('#toast');
let W,H,run=false,paused=false,last=0,score=0,best=0,level=1,lives=3,angle=0,spin=.032,gate=0,width=.72,pulse=0,shake=0,parts=[];
function resize(){W=c.width=innerWidth;H=c.height=innerHeight}addEventListener('resize',resize);
function reset(){score=0;level=1;lives=3;angle=0;spin=.032;gate=Math.random()*Math.PI*2;width=.72;parts=[];pulse=0;shake=0;run=true;screen.classList.add('hide');scoreEl.textContent='0000';toast.textContent='BREACH'}
function norm(a){a%=Math.PI*2;return a<0?a+Math.PI*2:a}
function dist(a,b){let d=Math.abs(norm(a)-norm(b));return Math.min(d,Math.PI*2-d)}
function burst(col,n,r=110){let cx=W/2,cy=H/2;for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,s=1+Math.random()*5;parts.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:1,c:col})}}
function hit(){if(!run||paused)return;let ok=dist(angle,gate)<width/2;if(ok){score+=100+level*25;level++;spin=Math.min(.105,spin+.006);width=Math.max(.2,width*.91);gate=norm(gate+Math.PI*(.55+Math.random()*.9));pulse=1;shake=5;burst('#d9ff3e',18,118);toast.textContent='BREACH '+String(level-1).padStart(2,'0');toast.classList.add('on');setTimeout(()=>toast.classList.remove('on'),160)}else{lives--;shake=18;burst('#ff315f',28,118);toast.textContent='ALERTE -'+(3-lives);toast.classList.add('on');setTimeout(()=>toast.classList.remove('on'),220);if(lives<=0)die()}scoreEl.textContent=String(score).padStart(4,'0')}
function die(){run=false;best=Math.max(score,+(localStorage.orbitBest||0));localStorage.orbitBest=best;screen.querySelector('p').textContent='COFFRE PERDU — SCORE '+score+' — RECORD '+best;screen.querySelector('button').textContent='RECONNECTER →';setTimeout(()=>screen.classList.remove('hide'),380)}
function update(dt){if(run&&!paused){angle=norm(angle+spin*dt*60*(1+level*.025));pulse*=.86;shake*=.82;parts.forEach((p,i)=>{p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vx*=.985;p.vy*=.985;p.l-=dt*1.8;if(p.l<=0)parts.splice(i,1)})}}
function draw(){x.save();x.clearRect(0,0,W,H);x.fillStyle='#090a0e';x.fillRect(0,0,W,H);x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);let cx=W/2,cy=H/2,R=Math.min(W,H)*.26;x.strokeStyle='#ffffff10';for(let i=0;i<18;i++){x.beginPath();x.moveTo(0,cy-H+i*H/9);x.lineTo(W,cy-H+i*H/9);x.stroke()}for(let i=0;i<3;i++){x.lineWidth=2+i*2;x.strokeStyle=i?'#ffffff12':'#d9ff3e22';x.beginPath();x.arc(cx,cy,R+i*34+Math.sin(level+i)*4,0,7);x.stroke()}x.lineWidth=18;x.strokeStyle='#ffffff16';x.beginPath();x.arc(cx,cy,R,0,7);x.stroke();x.strokeStyle='#d9ff3e';x.shadowBlur=26;x.shadowColor='#d9ff3e';x.beginPath();x.arc(cx,cy,R,gate-width/2,gate+width/2);x.stroke();x.shadowBlur=0;x.lineWidth=4;x.strokeStyle='#ff315f';x.beginPath();x.arc(cx,cy,R+28,angle-.18,angle+.18);x.stroke();let px=cx+Math.cos(angle)*R,py=cy+Math.sin(angle)*R;x.fillStyle='#ff315f';x.shadowBlur=24;x.shadowColor='#ff315f';x.beginPath();x.arc(px,py,9+pulse*9,0,7);x.fill();x.shadowBlur=0;x.fillStyle='#f0ede4';x.font='900 '+Math.max(44,Math.min(90,W*.09))+'px Arial';x.textAlign='center';x.textBaseline='middle';x.fillText(String(level).padStart(2,'0'),cx,cy-6);x.font='700 12px monospace';x.fillStyle='#d9ff3e';x.fillText('VIES '+('●'.repeat(lives)+'○'.repeat(3-lives)),cx,cy+54);parts.forEach(p=>{x.globalAlpha=Math.max(0,p.l);x.fillStyle=p.c;x.fillRect(p.x,p.y,4,4)});x.globalAlpha=1;x.restore()}
function loop(now){let dt=Math.min((now-last)/1000,.033)||0;last=now;update(dt);draw();requestAnimationFrame(loop)}
addEventListener('keydown',e=>{if(e.key==='Escape'){parent.postMessage('togglePause','*');return}if(e.code==='Space'||e.key==='Enter'){e.preventDefault();hit()}});c.addEventListener('pointerdown',hit);addEventListener('message',e=>{if(e.data==='pause')paused=true;if(e.data==='resume')paused=false});document.querySelector('#go').onclick=reset;resize();requestAnimationFrame(loop);
</script></body></html>
