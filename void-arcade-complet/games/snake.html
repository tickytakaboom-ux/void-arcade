<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Snake Byte</title><style>*{box-sizing:border-box}body{margin:0;overflow:hidden;background:#ff5b35;color:#15110f;font-family:monospace}canvas{position:fixed;inset:0;width:100%;height:100%}.hud{position:fixed;inset:24px;pointer-events:none;display:flex;justify-content:space-between;font-weight:bold}.center{position:fixed;inset:0;display:grid;place-items:center;background:#ff5b35dd}.card{text-align:center}.card h1{font:900 clamp(60px,12vw,130px)/.75 Arial;margin:0;letter-spacing:-.08em}.card p{margin:28px}.card button{background:#15110f;color:white;border:0;padding:16px 26px;font-weight:bold;cursor:pointer;box-shadow:6px 6px #d9ff3e}.hidden{display:none}</style></head><body><canvas></canvas><div class="hud"><span>SNAKE BYTE</span><span>SCORE <b id="score">000</b></span></div><div class="center" id="screen"><div class="card"><h1>SNAKE<br>BYTE</h1><p>FLÈCHES / ZQSD — dévore les pixels</p><button id="go">JOUER →</button></div></div><script>
const c=document.querySelector('canvas'),x=c.getContext('2d'),sc=document.querySelector('#score'),screen=document.querySelector('#screen');let W,H,snake=[],food={x:-2,y:-2},dir,next,score,timer,paused=false,cell=24;
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;draw()}resize();onresize=resize;
function spawn(){food={x:Math.floor(Math.random()*(W/cell)),y:Math.floor(Math.random()*(H/cell))}}
function start(){snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}];dir=next={x:1,y:0};score=0;sc.textContent='000';spawn();screen.classList.add('hidden');clearInterval(timer);timer=setInterval(step,90)}
function step(){if(paused)return;dir=next;let h={x:snake[0].x+dir.x,y:snake[0].y+dir.y},cols=Math.floor(W/cell),rows=Math.floor(H/cell);if(h.x<0||h.y<0||h.x>=cols||h.y>=rows||snake.some(p=>p.x===h.x&&p.y===h.y)){clearInterval(timer);screen.classList.remove('hidden');screen.querySelector('p').textContent='SCORE '+score+' — ENCORE UNE ?';return}snake.unshift(h);if(h.x===food.x&&h.y===food.y){score+=10;sc.textContent=String(score).padStart(3,'0');spawn()}else snake.pop();draw()}
function draw(){x.fillStyle='#ff5b35';x.fillRect(0,0,W,H);x.strokeStyle='#18120d12';for(let i=0;i<W;i+=cell){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke()}for(let i=0;i<H;i+=cell){x.beginPath();x.moveTo(0,i);x.lineTo(W,i);x.stroke()}x.fillStyle='#d9ff3e';x.fillRect(food.x*cell+4,food.y*cell+4,cell-8,cell-8);snake.forEach((p,i)=>{x.fillStyle=i?'#17120f':'#fff';x.fillRect(p.x*cell+2,p.y*cell+2,cell-4,cell-4)})}
onkeydown=e=>{if(e.key==='Escape'){parent.postMessage('togglePause','*');return}let k=e.key.toLowerCase(),d=k==='arrowup'||k==='z'?{x:0,y:-1}:k==='arrowdown'||k==='s'?{x:0,y:1}:k==='arrowleft'||k==='q'?{x:-1,y:0}:k==='arrowright'||k==='d'?{x:1,y:0}:null;if(d&&!(d.x===-dir.x&&d.y===-dir.y)){e.preventDefault();next=d}};document.querySelector('#go').onclick=start;addEventListener('message',e=>{if(e.data==='pause')paused=true;if(e.data==='resume')paused=false});addEventListener('message',e=>{if(e.data==='pause')paused=true;if(e.data==='resume')paused=false});
</script></body></html>
